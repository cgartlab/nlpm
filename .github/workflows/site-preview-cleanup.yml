name: Remove PR preview

# Tears down a PR's preview deploy when the PR is closed (merged or not).
# Removes _pr/<n>/ from gh-pages and updates the sticky comment so the
# stale preview URL doesn't keep promising live content.
#
# Pair workflow: site-preview.yml (the deploy half).

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Serialize cleanup with deploy for the same PR — if a deploy is mid-
  # flight when the PR closes, we want it to finish before cleanup runs.
  group: site-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    # Mirror site-preview.yml's same-repo restriction. Fork PRs never got
    # a preview, so there is nothing to remove.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Remove preview subdirectory from gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SUBPATH="_pr/${PR_NUMBER}"

          git fetch origin gh-pages:gh-pages 2>/dev/null || \
            git branch gh-pages origin/gh-pages 2>/dev/null || true

          WT=$(mktemp -d)
          git worktree add "$WT" gh-pages

          if [ ! -d "$WT/$SUBPATH" ]; then
            echo "No preview at $SUBPATH; nothing to clean."
            cd "$GITHUB_WORKSPACE"
            git worktree remove "$WT" --force
            exit 0
          fi

          # `${SUBPATH:?}` guard prevents an empty SUBPATH from expanding
          # the `rm -rf` to the worktree root (shellcheck SC2115).
          rm -rf "$WT/${SUBPATH:?}"
          cd "$WT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add -A "$SUBPATH" || true
          if git diff --cached --quiet; then
            echo "Preview already absent; nothing to push."
            exit 0
          fi
          git commit -m "preview: cleanup PR #${PR_NUMBER}"

          for i in 1 2 3 4 5; do
            if git push origin gh-pages 2>&1; then break; fi
            echo "Push attempt $i failed — pulling + retrying"
            git pull --rebase origin gh-pages || true
            [ "$i" -eq 5 ] && { echo "::error::push failed after 5 attempts"; exit 1; }
          done

          cd "$GITHUB_WORKSPACE"
          git worktree remove "$WT" --force

      - name: Update sticky PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const marker = '<!-- nlpm-preview-comment -->';
            const merged = context.payload.pull_request.merged;
            const verb = merged ? 'merged' : 'closed';
            const body = [
              marker,
              `### 🧹 Preview removed`,
              ``,
              `PR was ${verb}; the preview at \`_pr/${context.payload.pull_request.number}/\` has been cleaned up.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
            // If no preview comment exists (e.g. PR was closed before any
            // preview ran), do nothing — silence is the correct signal.
